function doSaveProfile() {
    const p = {
        profile_name: document.getElementById('pName').value,
        business_type: document.getElementById('pBizType').value,
        industry_name: document.getElementById('pIndustry').value,
        region_sido: document.getElementById('pRegion').value,
        business_registration_number: document.getElementById('pRegNo').value,
        industry_code: document.getElementById('pIndCode').value,
        establishment_date: document.getElementById('pEstDate').value,
        region_sigungu: document.getElementById('pSigungu').value,
        representative_age: document.getElementById('pAge').value ? parseInt(document.getElementById('pAge').value) : null,
        annual_revenue: document.getElementById('pRevenue').value ? parseInt(document.getElementById('pRevenue').value) * 10000 : null,
        employee_count: document.getElementById('pEmpCount').value ? parseInt(document.getElementById('pEmpCount').value) : null,
        business_age_years: document.getElementById('pBizAge').value ? parseFloat(document.getElementById('pBizAge').value) : null,
        credit_rating: document.getElementById('pCredit').value,
        debt_ratio: document.getElementById('pDebt').value ? parseFloat(document.getElementById('pDebt').value) : null,
        previous_subsidy_count: parseInt(document.getElementById('pPrevCount').value) || 0,
        business_description: document.getElementById('pBizDesc').value,
        has_export: document.getElementById('pExport').checked,
        is_female_owned: document.getElementById('pFemale').checked,
        is_disabled_owned: document.getElementById('pDisabled').checked,
        is_social_enterprise: document.getElementById('pSocial').checked,
        is_venture_certified: document.getElementById('pVenture').checked,
        is_innobiz: document.getElementById('pInnobiz').checked,
        has_employment_insurance: document.getElementById('pInsurance').checked
    };
    saveProfile(p);
    showToast('프로필이 저장되었습니다');
}

// ===== Detail Modal =====
function showSubsidyDetail(id) {
    const numId = typeof id === 'string' ? parseInt(id, 10) : id;
    const s = subsidies.find(x => x.id === numId || x.id === id);
    if (!s) return;
    const st = getStatus(s.apply_end_date, s.apply_start_date);
    const srcNames = { bizinfo:'기업마당', mss:'중소벤처기업부', kstartup:'K-스타트업', smes:'중소벤처24' };

    // Match probability if available
    const mr = matchResults.find(r => r.id === id || r.subsidy_id === numId);
    const probRange = (mr && mr.probability_range) ? '<div style="font-size:12px;color:#3b82f6;margin-top:2px;">추정 범위: '+mr.probability_range.low.toFixed(0)+'% ~ '+mr.probability_range.high.toFixed(0)+'%</div>' : '';
    const probHtml = mr ? '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 14px;background:#dbeafe;border-radius:var(--radius);"><i class="lucide-target" style="font-size:18px;color:#1d4ed8;"></i><div><div style="font-size:20px;font-weight:800;color:#1d4ed8;">'+mr.final_probability.toFixed(1)+'%</div><div style="font-size:11px;color:#3b82f6;">나의 선정 확률 · 신뢰도: '+mr.confidence_level+'</div>'+probRange+'</div></div>' : '';

    // Date info
    let dateInfo = '';
    if (s.apply_start_date && s.apply_end_date) {
        dateInfo = s.apply_start_date + ' ~ ' + s.apply_end_date;
    } else if (s.apply_end_date) {
        dateInfo = '~ ' + s.apply_end_date;
    } else if (s.apply_start_date) {
        dateInfo = s.apply_start_date + ' ~';
    } else {
        dateInfo = '상시 모집';
    }

    let html = probHtml;

    // Basic Info Section
    html += '<div class="detail-section"><div class="detail-section-title"><i class="lucide-info"></i> 기본 정보</div>';
    html += '<div class="detail-row"><div class="detail-label">상태</div><div class="detail-value"><span class="tag '+st.cls+'">'+st.text+'</span></div></div>';
    html += '<div class="detail-row"><div class="detail-label">사업명</div><div class="detail-value" style="font-weight:700;">'+esc(s.title)+'</div></div>';
    html += '<div class="detail-row"><div class="detail-label">분야</div><div class="detail-value"><span class="tag tag-blue">'+esc(s.category)+'</span></div></div>';
    html += '<div class="detail-row"><div class="detail-label">소관기관</div><div class="detail-value">'+esc(s.organization)+'</div></div>';
    if (s.executor) html += '<div class="detail-row"><div class="detail-label">수행기관</div><div class="detail-value">'+esc(s.executor)+'</div></div>';
    html += '<div class="detail-row"><div class="detail-label">출처</div><div class="detail-value">'+(srcNames[s.source]||esc(s.source))+'</div></div>';
    html += '</div>';

    // Schedule Section
    html += '<div class="detail-section"><div class="detail-section-title"><i class="lucide-calendar"></i> 일정 정보</div>';
    html += '<div class="detail-row"><div class="detail-label">접수기간</div><div class="detail-value">'+dateInfo+'</div></div>';
    if (s.apply_end_date) {
        const diff = Math.ceil((new Date(s.apply_end_date) - new Date()) / 86400000);
        const dColor = diff <= 0 ? '#dc2626' : diff <= 7 ? '#1e3a5f' : '#2563eb';
        html += '<div class="detail-row"><div class="detail-label">남은 기간</div><div class="detail-value" style="font-weight:700;color:'+dColor+';">'+(diff<=0?'마감':'D-'+diff)+'</div></div>';
    }
    html += '<div class="detail-row"><div class="detail-label">등록일</div><div class="detail-value">'+(s.created_at||'-').slice(0,10)+'</div></div>';
    html += '</div>';

    // Target & Conditions
    if (s.target || s.region || s.business_type_required || s.industry_required || s.employee_range || s.revenue_range || s.business_age_range || s.region_required || s.special_conditions) {
        html += '<div class="detail-section"><div class="detail-section-title"><i class="lucide-users"></i> 지원 대상 및 조건</div>';
        if (s.target) {
            html += '<div class="detail-row"><div class="detail-label">지원대상</div><div class="detail-value"><div class="detail-tags">'+s.target.split(',').map(t=>'<span class="tag tag-blue">'+esc(t.trim())+'</span>').join('')+'</div></div></div>';
        }
        if (s.region) html += '<div class="detail-row"><div class="detail-label">지역</div><div class="detail-value">'+esc(s.region)+'</div></div>';
        if (s.business_type_required) html += '<div class="detail-row"><div class="detail-label">사업자유형</div><div class="detail-value">'+esc(s.business_type_required)+'</div></div>';
        if (s.industry_required) html += '<div class="detail-row"><div class="detail-label">업종 조건</div><div class="detail-value">'+esc(s.industry_required)+'</div></div>';
        if (s.employee_range) html += '<div class="detail-row"><div class="detail-label">종업원 수</div><div class="detail-value">'+esc(s.employee_range)+'</div></div>';
        if (s.revenue_range) html += '<div class="detail-row"><div class="detail-label">매출 범위</div><div class="detail-value">'+esc(s.revenue_range)+'</div></div>';
        if (s.business_age_range) html += '<div class="detail-row"><div class="detail-label">업력</div><div class="detail-value">'+esc(s.business_age_range)+'</div></div>';
        if (s.region_required) html += '<div class="detail-row"><div class="detail-label">지역 제한</div><div class="detail-value">'+esc(s.region_required)+'</div></div>';
        if (s.special_conditions) html += '<div class="detail-row"><div class="detail-label">특별 조건</div><div class="detail-value">'+esc(s.special_conditions)+'</div></div>';
        html += '</div>';
    }

    // Support Details
    if (s.support_amount || s.competition_rate || s.selection_count || s.application_count) {
        html += '<div class="detail-section"><div class="detail-section-title"><i class="lucide-banknote"></i> 지원 내용</div>';
        if (s.support_amount) html += '<div class="detail-row"><div class="detail-label">지원금액</div><div class="detail-value" style="font-weight:700;color:var(--primary);">'+esc(s.support_amount)+'</div></div>';
        if (s.competition_rate) html += '<div class="detail-row"><div class="detail-label">경쟁률</div><div class="detail-value">'+s.competition_rate+'</div></div>';
        if (s.selection_count) html += '<div class="detail-row"><div class="detail-label">선정 인원</div><div class="detail-value">'+s.selection_count+'</div></div>';
        if (s.application_count) html += '<div class="detail-row"><div class="detail-label">신청 건수</div><div class="detail-value">'+s.application_count+'</div></div>';
        html += '</div>';
    }

    // Description / Content
    if (s.description || s.detail_content || s.hwp_content || s.eligibility_keywords) {
        html += '<div class="detail-section"><div class="detail-section-title"><i class="lucide-file-text"></i> 상세 내용</div>';
        if (s.description) html += '<div style="font-size:13px;line-height:1.7;color:var(--text);padding:8px 0;">'+esc(s.description)+'</div>';
        if (s.detail_content) html += '<div style="font-size:13px;line-height:1.7;color:var(--text);padding:8px 0;">'+esc(s.detail_content).substring(0,1000)+'</div>';
        if (s.hwp_content) html += '<div style="font-size:13px;line-height:1.7;color:var(--text);padding:8px 0;border-top:1px solid var(--border-light);margin-top:8px;">'+esc(s.hwp_content).substring(0,1000)+'</div>';
        if (s.eligibility_keywords) html += '<div class="detail-row"><div class="detail-label">키워드</div><div class="detail-value"><div class="detail-tags">'+esc(s.eligibility_keywords).split(',').map(k=>'<span class="tag tag-blue">'+k.trim()+'</span>').join('')+'</div></div></div>';
        html += '</div>';
    }

    // Match Score Breakdown (if available)
    if (mr) {
        html += '<div class="detail-section"><div class="detail-section-title"><i class="lucide-bar-chart"></i> 매칭 분석</div>';
        const scores = [
            ['자격요건 적합도', mr.eligibility_score, '#1e3a5f'],
            ['조건 매칭도', mr.matching_score, '#1d4ed8'],
            ['선정률 (사전확률)', mr.competition_score, '#3b82f6'],
            ['이력 보정', mr.historical_score, '#93bbfd']
        ];
        scores.forEach(([label, val, color]) => {
            html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><span style="min-width:90px;font-size:11px;color:var(--text-secondary);">'+label+'</span><div style="flex:1;height:8px;background:var(--border-light);border-radius:4px;overflow:hidden;"><div style="height:100%;width:'+val.toFixed(0)+'%;background:'+color+';border-radius:4px;"></div></div><span style="min-width:30px;font-size:12px;font-weight:700;color:var(--heading);text-align:right;">'+val.toFixed(0)+'</span></div>';
        });
        html += '</div>';
    }

    // Action Buttons
    html += '<div style="padding-top:8px;">';
    if (s.detail_url) {
        html += '<a href="'+esc(s.detail_url)+'" target="_blank" rel="noopener" class="detail-link-btn primary"><i class="lucide-external-link" style="font-size:16px;"></i> 공고 원문 보기</a>';
        html += '<a href="'+esc(s.detail_url)+'" target="_blank" rel="noopener" class="detail-link-btn outline"><i class="lucide-download" style="font-size:16px;"></i> 첨부파일 확인 (원문 페이지)</a>';
    } else {
        // Build search URL based on source
        let searchUrl = '';
        if (s.source === 'bizinfo') searchUrl = 'https://www.bizinfo.go.kr/web/lay1/bbs/S1T122C128/AS/74/view.do?pblancId=' + (s.external_id||'');
        else if (s.source === 'kstartup') searchUrl = 'https://www.k-startup.go.kr/web/contents/bizpbanc-ongoing.do';
        else if (s.source === 'smes') searchUrl = 'https://www.smes.go.kr/main/sportsBsnsPolicy';
        else if (s.source === 'mss') searchUrl = 'https://www.mss.go.kr/site/smba/main.do';
        if (searchUrl) {
            html += '<a href="'+searchUrl+'" target="_blank" rel="noopener" class="detail-link-btn primary"><i class="lucide-external-link" style="font-size:16px;"></i> 출처 사이트에서 확인</a>';
        }
    }
    html += '</div>';

    // Set title (decode entities)
    const titleEl = document.getElementById('detailTitle');
    titleEl.textContent = '';
    const tmpTitle = document.createElement('textarea');
    tmpTitle.innerHTML = s.title || '상세 정보';
    titleEl.textContent = tmpTitle.value;

    document.getElementById('detailBody').innerHTML = html;
    document.getElementById('detailModal').classList.add('show');
}

function showDetail(id) { showSubsidyDetail(id); }

function closeDetail() {
    document.getElementById('detailModal').classList.remove('show');
}

checkAuth();
